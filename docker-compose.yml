version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: neoteacher-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: neoteacher
      MYSQL_USER: neoteacher
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: "look1976/neoteacher:backend-${IMAGE_TAG:-latest}"
    container_name: neoteacher-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://neoteacher:password@mysql:3306/neoteacher"
      NODE_ENV: production
    depends_on:
      - mysql
    ports:
      - "4000:4000"

  frontend:
    image: "look1976/neoteacher:frontend-${IMAGE_TAG:-latest}"
    container_name: neoteacher-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
