version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: neoteacher-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: neoteacher
      MYSQL_USER: neoteacher
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
